netary Fund","zh":"国际货币基金组织／國際貨幣基金組織","example":"The International Monetary Fund provides financial assistance and advice.","aliases":"IMF"},{"id":205,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"World Bank","zh":"世界银行／世界銀行","example":"The World Bank funds development projects.","aliases":""},{"id":206,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"migration","zh":"迁移／遷移","example":"Migration is the movement of people from one place to another.","aliases":""},{"id":207,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"immigration","zh":"移入","example":"Immigration is movement into a country.","aliases":""},{"id":208,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"emigration","zh":"移出","example":"Emigration is movement out of a country.","aliases":""},{"id":209,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"internal migration","zh":"国内迁移／國內遷移","example":"Internal migration occurs within one country.","aliases":""},{"id":210,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"international migration","zh":"国际迁移／國際遷移","example":"International migration crosses national borders.","aliases":""},{"id":211,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"forced migration","zh":"被迫迁移／被迫遷移","example":"Forced migration occurs when people have little choice but to move.","aliases":""},{"id":212,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"voluntary migration","zh":"自愿迁移／自願遷移","example":"Voluntary migration is chosen for work, education or family reasons.","aliases":""},{"id":213,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"push factor","zh":"推力因素","example":"Push factors encourage people to leave a place.","aliases":""},{"id":214,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"pull factor","zh":"拉力因素","example":"Pull factors attract people to a place.","aliases":""},{"id":215,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"remittance","zh":"汇款／匯款","example":"Remittances are money sent home by migrants.","aliases":""},{"id":216,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"brain drain","zh":"人才流失","example":"Brain drain occurs when skilled workers leave a country.","aliases":""},{"id":217,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"tourism","zh":"旅游业／旅遊業","example":"Tourism can create jobs but may damage environments.","aliases":""},{"id":218,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"mass tourism","zh":"大众旅游／大眾旅遊","example":"Mass tourism brings large numbers of visitors to a destination.","aliases":""},{"id":219,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"ecotourism","zh":"生态旅游／生態旅遊","example":"Ecotourism aims to benefit conservation and local communities.","aliases":""},{"id":220,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"geopolitical relationship","zh":"地缘政治关系／地緣政治關係","example":"Geopolitical relationships shape trade, migration and conflict.","aliases":""},{"id":221,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"border control","zh":"边境管制／邊境管制","example":"Border control influences international migration flows.","aliases":""},{"id":222,"chapter":"Chapter 8 Globalisation and migration","category":"Global issues","en":"migration management","zh":"迁移管理／遷移管理","example":"Migration management attempts to regulate movement and support migrants.","aliases":""},{"id":223,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"development","zh":"发展／發展","example":"Development involves economic and social improvement.","aliases":""},{"id":224,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"human welfare","zh":"人类福祉／人類福祉","example":"Human welfare includes health, education, income and security.","aliases":""},{"id":225,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"quality of life","zh":"生活质量／生活質素／生活品質","example":"Quality of life includes material and non-material wellbeing.","aliases":""},{"id":226,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"standard of living","zh":"生活水平","example":"Standard of living often refers to income and material conditions.","aliases":""},{"id":227,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"gross domestic product","zh":"国内生产总值／國內生產總值","example":"Gross domestic product measures the value of goods and services produced.","aliases":"GDP"},{"id":228,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"GDP per capita","zh":"人均国内生产总值／人均國內生產總值","example":"GDP per capita divides national output by population.","aliases":""},{"id":229,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"Human Development Index","zh":"人类发展指数／人類發展指數","example":"The Human Development Index combines income, education and life expectancy.","aliases":"HDI"},{"id":230,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"life expectancy","zh":"预期寿命／預期壽命","example":"Life expectancy is a common indicator of development.","aliases":""},{"id":231,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"literacy rate","zh":"识字率／識字率","example":"Literacy rate measures the proportion of people who can read and write.","aliases":""},{"id":232,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"infant mortality rate","zh":"婴儿死亡率／嬰兒死亡率","example":"Infant mortality rate usually falls as healthcare improves.","aliases":"IMR"},{"id":233,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"birth rate","zh":"出生率","example":"Birth rate is the number of live births per thousand people per year.","aliases":""},{"id":234,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"death rate","zh":"死亡率","example":"Death rate is the number of deaths per thousand people per year.","aliases":""},{"id":235,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"demographic transition model","zh":"人口转型模型／人口轉型模型","example":"The demographic transition model links population change to development.","aliases":"DTM"},{"id":236,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"population pyramid","zh":"人口金字塔","example":"A population pyramid shows age and sex structure.","aliases":""},{"id":237,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"uneven development","zh":"发展不均／發展不均","example":"Uneven development creates contrasts between and within countries.","aliases":""},{"id":238,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"development gap","zh":"发展差距／發展差距","example":"The development gap can be measured using economic and social indicators.","aliases":""},{"id":239,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"poverty cycle","zh":"贫困循环／貧困循環","example":"The poverty cycle makes it difficult for people to escape poverty.","aliases":""},{"id":240,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"aid","zh":"援助","example":"Aid can be short-term emergency relief or long-term development support.","aliases":""},{"id":241,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"bilateral aid","zh":"双边援助／雙邊援助","example":"Bilateral aid is given from one government to another.","aliases":""},{"id":242,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"multilateral aid","zh":"多边援助／多邊援助","example":"Multilateral aid is distributed through international organisations.","aliases":""},{"id":243,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"non-governmental organisation","zh":"非政府组织／非政府組織","example":"Non-governmental organisations often deliver development projects.","aliases":"NGO"},{"id":244,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"fair trade","zh":"公平贸易／公平貿易","example":"Fair trade aims to give producers better prices and working conditions.","aliases":""},{"id":245,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"debt relief","zh":"债务减免／債務減免","example":"Debt relief can free government spending for development.","aliases":""},{"id":246,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"sustainable development","zh":"可持续发展／可持續發展","example":"Sustainable development meets present needs without harming future generations.","aliases":""},{"id":247,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"Millennium Development Goals","zh":"千年发展目标／千年發展目標","example":"The Millennium Development Goals preceded the Sustainable Development Goals.","aliases":"MDGs"},{"id":248,"chapter":"Chapter 9 Development and human welfare","category":"Global issues","en":"Sustainable Development Goals","zh":"可持续发展目标／可持續發展目標","example":"The Sustainable Development Goals cover poverty, health, education and climate.","aliases":"SDGs"}];
const storeKey='igGeographyTrainerProgressV1';
const wrongKey='igGeographyTrainerWrongV1';
const el={totalCount:document.getElementById('totalCount'),answeredCount:document.getElementById('answeredCount'),accuracyCount:document.getElementById('accuracyCount'),chapterFilter:document.getElementById('chapterFilter'),directionSelect:document.getElementById('directionSelect'),paceSelect:document.getElementById('paceSelect'),chapterTag:document.getElementById('chapterTag'),categoryTag:document.getElementById('categoryTag'),directionTag:document.getElementById('directionTag'),promptText:document.getElementById('promptText'),exampleText:document.getElementById('exampleText'),answerInput:document.getElementById('answerInput'),checkBtn:document.getElementById('checkBtn'),feedback:document.getElementById('feedback'),nextBtn:document.getElementById('nextBtn'),revealBtn:document.getElementById('revealBtn'),addWrongBtn:document.getElementById('addWrongBtn'),switchBtn:document.getElementById('switchBtn'),progressBar:document.getElementById('progressBar'),wrongList:document.getElementById('wrongList'),reviewWrongBtn:document.getElementById('reviewWrongBtn'),clearWrongBtn:document.getElementById('clearWrongBtn')};
const state={current:null,direction:'en-zh',answered:0,correct:0,wrong:load(wrongKey,[]),progress:load(storeKey,{})};
function load(key,fallback){try{return JSON.parse(localStorage.getItem(key))??fallback}catch(e){return fallback}}
function save(){localStorage.setItem(storeKey,JSON.stringify(state.progress));localStorage.setItem(wrongKey,JSON.stringify(state.wrong));}
function cnNorm(s){return String(s||'').toLowerCase().replace(/[／\/，,；;、。\.\s-]+/g,'').replace(/[環迴]/g,'环').replace(/區/g,'区').replace(/灣/g,'湾').replace(/災/g,'灾').replace(/風/g,'风').replace(/氣/g,'气').replace(/業/g,'业').replace(/濟/g,'济').replace(/發/g,'发').replace(/展/g,'展').replace(/貿/g,'贸').replace(/體/g,'体').replace(/質/g,'质').replace(/壽/g,'寿').replace(/識/g,'识').replace(/邊/g,'边').replace(/遷/g,'迁').replace(/國/g,'国').replace(/際/g,'际').replace(/組/g,'组').replace(/織/g,'织').replace(/貧/g,'贫').replace(/債/g,'债').replace(/續/g,'续').replace(/礎/g,'础').replace(/設/g,'设').replace(/勞/g,'劳').replace(/動/g,'动').replace(/應/g,'应').replace(/給/g,'给').replace(/產/g,'产').replace(/農/g,'农').replace(/鄉/g,'乡').replace(/態/g,'态').replace(/營/g,'营').replace(/營/g,'营').replace(/濕/g,'湿').replace(/鹽/g,'盐').replace(/紅/g,'红').replace(/樹/g,'树').replace(/綠/g,'绿').replace(/廢/g,'废').replace(/擁/g,'拥').replace(/擬/g,'拟').replace(/數/g,'数').replace(/總/g,'总').replace(/別/g,'别').replace(/開/g,'开').replace(/閉/g,'闭').replace(/測/g,'测').replace(/預/g,'预').replace(/減/g,'减').replace(/復/g,'复').replace(/衝/g,'冲').replace(/構/g,'构').replace(/塊/g,'块').replace(/級/g,'级').replace(/噴/g,'喷').replace(/狀/g,'状').replace(/颱/g,'台').replace(/廣/g,'广').replace(/圖/g,'图')}
function enNorm(s){return String(s||'').toLowerCase().replace(/&/g,' and ').replace(/centre/g,'center').replace(/metre/g,'meter').replace(/isation/g,'ization').replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim()}
function tokens(s){return enNorm(s).split(' ').filter(Boolean).map(t=>t.replace(/ies$/,'y').replace(/s$/,''))}
function scoreEnglish(input,item){const ans=enNorm(input);if(!ans)return 0;const choices=[item.en,item.aliases||''].join(' ').split(/\s{2,}|,|;/).concat([item.en]);let best=0;for(const c of choices){const target=enNorm(c);if(!target)continue;if(ans===target)return 1;if(target.length>5&&(ans.includes(target)||target.includes(ans)))best=Math.max(best,.82);const a=new Set(tokens(ans)),b=new Set(tokens(target));let hit=0;b.forEach(x=>{if(a.has(x))hit++});best=Math.max(best,hit/Math.max(1,b.size));}const caps=(item.aliases||'').match(/\b[A-Z]{2,}\b/g)||[];if(caps.some(x=>enNorm(x)===ans))best=Math.max(best,1);return best}
function scoreChinese(input,item){const ans=cnNorm(input);if(!ans)return 0;const parts=String(item.zh).split(/[／/、,，;；]/).map(cnNorm).filter(Boolean);if(parts.some(p=>ans===p))return 1;if(parts.some(p=>p.length>=2&&(ans.includes(p)||p.includes(ans))))return .85;let best=0;for(const p of parts){let common=0;for(const ch of new Set(p)){if(ans.includes(ch))common++}best=Math.max(best,common/Math.max(1,new Set(p).size));}return best}
function filtered(){const ch=el.chapterFilter.value;return vocabulary.filter(v=>ch==='all'||v.chapter===ch)}
function pickQuestion(forceList){const list=(forceList&&forceList.length?forceList:filtered());if(!list.length)return;let pool=list.slice();const pace=el.paceSelect.value;pool.sort((a,b)=>weight(b,pace)-weight(a,pace)+Math.random()-.5);state.current=pool[0];const pref=el.directionSelect.value;state.direction=pref==='auto'?(Math.random()<0.55?'en-zh':'zh-en'):pref;renderQuestion();}
function weight(item,pace){const p=state.progress[item.id]||{seen:0,correct:0,wrong:0};const accuracy=p.seen?p.correct/p.seen:0;let w=1+(p.wrong*1.8)-(p.correct*.55);if(accuracy>.75)w-=pace==='fast'?1.4:.8;if(p.seen===0)w+=pace==='review'?.4:1.8;if(pace==='review')w+=p.wrong*1.2;return Math.max(.15,w)}
function renderQuestion(){const q=state.current;if(!q)return;el.chapterTag.textContent=q.chapter;el.categoryTag.textContent=q.category;el.directionTag.textContent=state.direction==='en-zh'?'英译中':'中译英';el.promptText.textContent=state.direction==='en-zh'?q.en:q.zh;el.exampleText.textContent=state.direction==='en-zh'?q.example:'请写出对应英文术语。';el.answerInput.value='';el.feedback.className='feedback';el.feedback.style.display='none';el.answerInput.focus();updateStats();}
function checkAnswer(){const q=state.current;if(!q)return;const input=el.answerInput.value.trim();const score=state.direction==='en-zh'?scoreChinese(input,q):scoreEnglish(input,q);const ok=score>=.72;state.answered++;if(ok)state.correct++;const p=state.progress[q.id]||{seen:0,correct:0,wrong:0};p.seen++;ok?p.correct++:p.wrong++;state.progress[q.id]=p;save();el.feedback.className='feedback '+(ok?'good':'bad');el.feedback.style.display='block';el.feedback.innerHTML=ok?`判断：正确。<br><span class="answer-key">标准答案：</span>${escapeHtml(q.en)} ｜ ${escapeHtml(q.zh)}`:`判断：需要复习。<br><span class="answer-key">标准答案：</span>${escapeHtml(q.en)} ｜ ${escapeHtml(q.zh)}<br>你的答案：${escapeHtml(input||'（空）')}`;updateStats();}
function revealAnswer(){const q=state.current;if(!q)return;el.feedback.className='feedback neutral';el.feedback.style.display='block';el.feedback.innerHTML=`<span class="answer-key">答案：</span>${escapeHtml(q.en)} ｜ ${escapeHtml(q.zh)}<br>${escapeHtml(q.example)}`;}
function addWrongItem(){const q=state.current;if(!q)return;if(!state.wrong.some(x=>x.id===q.id)){state.wrong.unshift({id:q.id,addedAt:Date.now()});save();renderWrong();}el.feedback.className='feedback neutral';el.feedback.style.display='block';el.feedback.innerHTML='已手动加入错题集。';}
function renderWrong(){if(!state.wrong.length){el.wrongList.innerHTML='<div class="empty">还没有手动加入的错题</div>';return;}el.wrongList.innerHTML=state.wrong.map(w=>{const q=vocabulary.find(v=>v.id===w.id);if(!q)return'';return `<div class="wrong"><strong>${escapeHtml(q.en)}</strong><span>${escapeHtml(q.zh)}</span><span>${escapeHtml(q.chapter)}</span><div class="mini"><button data-review="${q.id}" class="secondary">练这题</button><button data-remove="${q.id}" class="ghost">移除</button></div></div>`}).join('');}
function reviewWrong(){const ids=new Set(state.wrong.map(w=>w.id));const list=vocabulary.filter(v=>ids.has(v.id));pickQuestion(list);}
function clearWrong(){state.wrong=[];save();renderWrong();}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function updateStats(){el.totalCount.textContent=vocabulary.length;el.answeredCount.textContent=state.answered;el.accuracyCount.textContent=state.answered?Math.round(state.correct/state.answered*100)+'%':'0%';const seen=Object.keys(state.progress).length;el.progressBar.style.width=Math.min(100,seen/vocabulary.length*100)+'%';}
function setup(){[...new Set(vocabulary.map(v=>v.chapter))].forEach(ch=>{const opt=document.createElement('option');opt.value=ch;opt.textContent=ch;el.chapterFilter.appendChild(opt)});el.checkBtn.addEventListener('click',checkAnswer);el.nextBtn.addEventListener('click',()=>pickQuestion());el.revealBtn.addEventListener('click',revealAnswer);el.addWrongBtn.addEventListener('click',addWrongItem);el.switchBtn.addEventListener('click',()=>{el.directionSelect.value=state.direction==='en-zh'?'zh-en':'en-zh';pickQuestion();});el.chapterFilter.addEventListener('change',()=>pickQuestion());el.directionSelect.addEventListener('change',()=>pickQuestion());el.paceSelect.addEventListener('change',()=>pickQuestion());el.answerInput.addEventListener('keydown',e=>{if(e.key==='Enter')checkAnswer();});document.addEventListener('keydown',e=>{if(e.key==='1'&&document.activeElement!==el.answerInput){e.preventDefault();pickQuestion();}});el.reviewWrongBtn.addEventListener('click',reviewWrong);el.clearWrongBtn.addEventListener('click',clearWrong);el.wrongList.addEventListener('click',e=>{const review=e.target.getAttribute('data-review');const remove=e.target.getAttribute('data-remove');if(review){const q=vocabulary.find(v=>String(v.id)===review);if(q){pickQuestion([q]);}}if(remove){state.wrong=state.wrong.filter(w=>String(w.id)!==remove);save();renderWrong();}});renderWrong();pickQuestion();updateStats();}
setup();
</script>
